<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card: #fffdfb;
      --border: #ece2d9;
      --text: #5e5146;
      --muted: #a59688;
      --cream: #fffaf6;
      --blush: #f6ebe6;
      --sage: #aab39a;
      --sage-dark: #8d977c;
      --line: #f5eee9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 100%;
      min-height: 225px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .sparkle {
      width: 22px;
      height: 22px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-bottom: 24px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      min-height: 25px;
      padding: 4px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
    }

    .task-row:hover {
      background: #fff9f5;
    }

    .check {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1.6px solid #cdbfaf;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }

    .check.checked {
      background: var(--sage);
      border-color: var(--sage);
    }

    .check.checked::after {
      content: "✓";
      color: white;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .task-label {
      flex: 1;
      font-size: 13px;
      line-height: 1.25;
      color: #574a42;
    }

    .task-row.done .task-label {
      color: #8f8378;
    }

    .edit-btn {
      position: absolute;
      right: 14px;
      bottom: 12px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: #7b5d52;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 11px;
      cursor: pointer;
      font-weight: 700;
      z-index: 5;
    }

    .edit-btn:hover {
      background: #f7efe9;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 253, 251, 0.97);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 18px;
      z-index: 10;
    }

    .overlay.open {
      display: block;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: white;
      padding: 9px 10px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: #d7c7bb;
    }

    .edit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 90px;
      overflow: auto;
      padding-right: 3px;
      margin-bottom: 12px;
    }

    .edit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      border: 1px solid #eee4dd;
      background: #fffaf6;
      border-radius: 10px;
      padding: 7px 9px;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #b48a84;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: var(--blush);
      color: #6e5348;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .small-btn.secondary {
      background: var(--cream);
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <svg class="sparkle" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2.5L14.1 8L20 10L14.1 12L12 17.5L9.9 12L4 10L9.9 8L12 2.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <div class="title">Win The Day</div>
    </div>

    <div id="taskList" class="task-list"></div>

    <button class="edit-btn" onclick="openEdit()">Edit</button>

    <div id="overlay" class="overlay">
      <div class="overlay-title">Edit win the day</div>

      <div class="input-row">
        <input id="newTaskInput" placeholder="e.g. Tidy vanity, 10 min walk">
        <button class="small-btn" onclick="addTask()">Add</button>
      </div>

      <div id="editList" class="edit-list"></div>

      <div class="actions">
        <button class="small-btn secondary" onclick="resetDefaultTasks()">Reset</button>
        <button class="small-btn secondary" onclick="closeEdit()">Done</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TASKS = [
      "Move my body",
      "Focus on priorities",
      "No phone scroll before bed",
      "Drink 2L of water",
      "Be kind to myself"
    ];

    let tasks = [];
    let checked = {};

    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function storageKey(name) {
      return `win-the-day-${todayKey()}-${name}`;
    }

    function normalise(text) {
      return (text || "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^\w\s]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function taskId(label) {
      return normalise(label);
    }

    function loadStorage() {
      try {
        tasks = JSON.parse(localStorage.getItem(storageKey("tasks")) || "null") || DEFAULT_TASKS;
        checked = JSON.parse(localStorage.getItem(storageKey("checked")) || "{}");
      } catch {
        tasks = DEFAULT_TASKS;
        checked = {};
      }

      tasks.forEach(task => {
        const id = taskId(task);
        if (checked[id] === undefined) checked[id] = false;
      });

      saveStorage();
    }

    function saveStorage() {
      localStorage.setItem(storageKey("tasks"), JSON.stringify(tasks));
      localStorage.setItem(storageKey("checked"), JSON.stringify(checked));
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toggleTask(task) {
      const id = taskId(task);
      checked[id] = !checked[id];
      saveStorage();
      render();
    }

    function render() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      if (!tasks.length) {
        list.innerHTML = `<div class="note">No tasks yet. Click edit to add your wins.</div>`;
        renderEditList();
        return;
      }

      tasks.forEach(task => {
        const id = taskId(task);
        const row = document.createElement("div");
        row.className = checked[id] ? "task-row done" : "task-row";

        const button = document.createElement("button");
        button.className = checked[id] ? "check checked" : "check";
        button.onclick = () => toggleTask(task);

        const label = document.createElement("span");
        label.className = "task-label";
        label.textContent = task;

        row.appendChild(button);
        row.appendChild(label);
        list.appendChild(row);
      });

      renderEditList();
    }

    function renderEditList() {
      const editList = document.getElementById("editList");
      editList.innerHTML = "";

      if (!tasks.length) {
        editList.innerHTML = `<div class="note">Your tasks will appear here.</div>`;
        return;
      }

      tasks.forEach((task, index) => {
        const row = document.createElement("div");
        row.className = "edit-item";

        const label = document.createElement("span");
        label.textContent = task;

        const remove = document.createElement("button");
        remove.className = "remove-btn";
        remove.textContent = "×";
        remove.onclick = () => removeTask(index);

        row.appendChild(label);
        row.appendChild(remove);
        editList.appendChild(row);
      });
    }

    function addTask() {
      const input = document.getElementById("newTaskInput");
      const value = input.value.trim();

      if (!value) return;

      tasks.push(value);
      checked[taskId(value)] = false;
      input.value = "";

      saveStorage();
      render();
    }

    function removeTask(index) {
      const removed = tasks[index];
      delete checked[taskId(removed)];

      tasks.splice(index, 1);

      saveStorage();
      render();
    }

    function resetDefaultTasks() {
      tasks = [...DEFAULT_TASKS];
      checked = {};

      tasks.forEach(task => {
        checked[taskId(task)] = false;
      });

      saveStorage();
      render();
    }

    function openEdit() {
      document.getElementById("overlay").classList.add("open");
      renderEditList();
    }

    function closeEdit() {
      document.getElementById("overlay").classList.remove("open");
    }

    document.getElementById("newTaskInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") addTask();
    });

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") closeEdit();
    });

    loadStorage();
    render();
  </script>
</body>
</html>
