<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card: #fffdfb;
      --border: #ece2d9;
      --text: #5e5146;
      --muted: #a59688;
      --cream: #fffaf6;
      --blush: #f6ebe6;
      --sage: #aab39a;
      --sage-dark: #8d977c;
      --shadow: rgba(99, 82, 70, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      padding: 8px;
    }

    .row {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
      min-height: 250px;
    }

    .meals-card {
      flex: 1.05;
      min-width: 270px;
    }

    .win-card {
      flex: 0.95;
      min-width: 260px;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .icon {
      width: 22px;
      height: 22px;
      color: #b5a493;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
    }

    .meal-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 22px;
    }

    .meal-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 12px;
      align-items: center;
      min-height: 50px;
    }

    .meal-label {
      font-size: 11px;
      font-weight: 700;
      color: #7a6658;
      margin-bottom: 4px;
      line-height: 1;
    }

    .meal-name {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.22;
      color: #4f443d;
      max-width: 170px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      font-weight: 400;
    }

    .food-img {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: #fff7f1;
      border: 1px solid #efe3db;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 6px 8px var(--shadow));
      overflow: hidden;
    }

    .food-svg {
      width: 54px;
      height: 54px;
      display: block;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-bottom: 24px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      min-height: 25px;
      padding: 4px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
    }

    .task-row:hover {
      background: #fff9f5;
    }

    .check {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1.6px solid #cdbfaf;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }

    .check.checked {
      background: var(--sage);
      border-color: var(--sage);
    }

    .check.checked::after {
      content: "✓";
      color: white;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .task-label {
      flex: 1;
      font-size: 13px;
      line-height: 1.25;
      color: #574a42;
    }

    .task-row.done .task-label {
      color: #8f8378;
    }

    .edit-btn {
      position: absolute;
      right: 14px;
      bottom: 12px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: #7b5d52;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 11px;
      cursor: pointer;
      font-weight: 700;
      z-index: 5;
    }

    .edit-btn:hover {
      background: #f7efe9;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 253, 251, 0.97);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 18px;
      z-index: 10;
    }

    .overlay.open {
      display: block;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text);
    }

    .input-stack {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: white;
      padding: 9px 10px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: #d7c7bb;
    }

    .edit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 90px;
      overflow: auto;
      padding-right: 3px;
      margin-bottom: 12px;
    }

    .edit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      border: 1px solid #eee4dd;
      background: #fffaf6;
      border-radius: 10px;
      padding: 7px 9px;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #b48a84;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: var(--blush);
      color: #6e5348;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .small-btn.secondary {
      background: var(--cream);
    }

    .loading,
    .error,
    .note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 650px) {
      .row {
        flex-direction: column;
        gap: 14px;
      }

      .meals-card,
      .win-card {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="row">
    <div class="card meals-card">
      <div class="top">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7 3V11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M5 3V7.5C5 9.2 5.9 10.4 7 10.4C8.1 10.4 9 9.2 9 7.5V3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M7 11V21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M16 3C18.2 4.6 19 7 18.3 9.5C17.8 11.2 16.8 12.4 15.7 12.8V21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <div class="title">Meals</div>
      </div>

      <div id="mealsContent">
        <div class="loading">Loading meals…</div>
      </div>

      <button class="edit-btn" onclick="openMealsEdit()">Edit</button>

      <div id="mealsOverlay" class="overlay">
        <div class="overlay-title">Edit meals</div>

        <div class="input-stack">
          <input id="breakfastInput" placeholder="Breakfast">
          <input id="lunchInput" placeholder="Lunch">
          <input id="dinnerInput" placeholder="Dinner">
        </div>

        <div class="actions">
          <button class="small-btn secondary" onclick="clearMealsCustom()">Clear</button>
          <button class="small-btn" onclick="saveMealsCustom()">Save</button>
          <button class="small-btn secondary" onclick="closeMealsEdit()">Done</button>
        </div>
      </div>
    </div>

    <div class="card win-card">
      <div class="top">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2.5L14.1 8L20 10L14.1 12L12 17.5L9.9 12L4 10L9.9 8L12 2.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
        <div class="title">Win The Day</div>
      </div>

      <div id="taskList" class="task-list"></div>

      <button class="edit-btn" onclick="openWinEdit()">Edit</button>

      <div id="winOverlay" class="overlay">
        <div class="overlay-title">Edit win the day</div>

        <div class="input-row">
          <input id="newTaskInput" placeholder="e.g. Tidy vanity, 10 min walk">
          <button class="small-btn" onclick="addWinTask()">Add</button>
        </div>

        <div id="editList" class="edit-list"></div>

        <div class="actions">
          <button class="small-btn secondary" onclick="resetWinDefaultTasks()">Reset</button>
          <button class="small-btn secondary" onclick="closeWinEdit()">Done</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://notion-daily-dashboard-api.vercel.app/api/dashboard";

    let apiMeals = {
      breakfast: "",
      lunch: "",
      dinner: ""
    };

    let customMeals = {
      breakfast: "",
      lunch: "",
      dinner: ""
    };

    const DEFAULT_WIN_TASKS = [
      "Move my body",
      "Focus on priorities",
      "No phone scroll before bed",
      "Drink 2L of water",
      "Be kind to myself"
    ];

    let winTasks = [];
    let checkedWin = {};

    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function storageKey(name) {
      return `meals-win-day-${todayKey()}-${name}`;
    }

    function normalise(text) {
      return (text || "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^\w\s]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanMeal(text) {
      return (text || "")
        .replace(/meals today/gi, "")
        .replace(/nothing planned for today/gi, "")
        .replace(/[•✨✦]/g, "")
        .trim();
    }

    function getMeal(type) {
      return cleanMeal(customMeals[type]) || cleanMeal(apiMeals[type]) || "";
    }

    function foodSVG(type) {
      const bowls = {
        breakfast: `
          <svg class="food-svg" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="25" fill="#FFF8F2"/>
            <ellipse cx="32" cy="38" rx="22" ry="12" fill="#EFE0D4"/>
            <ellipse cx="32" cy="34" rx="20" ry="10" fill="#F6E8D8"/>
            <circle cx="24" cy="32" r="4" fill="#C7776B"/>
            <circle cx="35" cy="31" r="4" fill="#B66E65"/>
            <circle cx="43" cy="36" r="3.5" fill="#D6A061"/>
            <path d="M22 38C28 41 37 41 44 38" stroke="#A7A77F" stroke-width="2" stroke-linecap="round"/>
          </svg>
        `,
        lunch: `
          <svg class="food-svg" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="25" fill="#FFF8F2"/>
            <ellipse cx="32" cy="38" rx="23" ry="13" fill="#EAD8CC"/>
            <ellipse cx="32" cy="34" rx="21" ry="11" fill="#CF7F58"/>
            <circle cx="24" cy="34" r="4" fill="#678A58"/>
            <circle cx="36" cy="31" r="4" fill="#8EA56B"/>
            <circle cx="45" cy="36" r="3" fill="#F4DFB1"/>
            <path d="M19 30C27 35 36 38 48 31" stroke="#EBD0A5" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M22 40C29 43 38 43 46 39" stroke="#6E8A5E" stroke-width="2" stroke-linecap="round"/>
          </svg>
        `,
        dinner: `
          <svg class="food-svg" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="25" fill="#FFF8F2"/>
            <ellipse cx="32" cy="39" rx="23" ry="12" fill="#E7D6CA"/>
            <ellipse cx="32" cy="35" rx="20" ry="10" fill="#C97151"/>
            <path d="M20 36C27 31 35 31 44 36" stroke="#F2D8A9" stroke-width="3" stroke-linecap="round"/>
            <path d="M22 39C30 43 38 43 45 39" stroke="#5F7F56" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="28" cy="32" r="3" fill="#F0CFA0"/>
            <circle cx="40" cy="35" r="3" fill="#8EA56B"/>
          </svg>
        `
      };

      return bowls[type] || bowls.lunch;
    }

    function renderMealRow(label, type) {
      const value = getMeal(type);

      return `
        <div class="meal-row">
          <div>
            <div class="meal-label">${label}</div>
            <div class="meal-name ${value ? "" : "empty"}">
              ${value ? escapeHTML(value) : "Not planned"}
            </div>
          </div>

          <div class="food-img">
            ${foodSVG(type)}
          </div>
        </div>
      `;
    }

    function renderMeals() {
      const content = document.getElementById("mealsContent");

      content.innerHTML = `
        <div class="meal-list">
          ${renderMealRow("Breakfast", "breakfast")}
          ${renderMealRow("Lunch", "lunch")}
          ${renderMealRow("Dinner", "dinner")}
        </div>
      `;
    }

    function openMealsEdit() {
      document.getElementById("mealsOverlay").classList.add("open");
      document.getElementById("breakfastInput").value = getMeal("breakfast");
      document.getElementById("lunchInput").value = getMeal("lunch");
      document.getElementById("dinnerInput").value = getMeal("dinner");
    }

    function closeMealsEdit() {
      document.getElementById("mealsOverlay").classList.remove("open");
    }

    function saveMealsCustom() {
      customMeals.breakfast = document.getElementById("breakfastInput").value.trim();
      customMeals.lunch = document.getElementById("lunchInput").value.trim();
      customMeals.dinner = document.getElementById("dinnerInput").value.trim();

      localStorage.setItem(storageKey("customMeals"), JSON.stringify(customMeals));
      renderMeals();
    }

    function clearMealsCustom() {
      customMeals = {
        breakfast: "",
        lunch: "",
        dinner: ""
      };

      localStorage.removeItem(storageKey("customMeals"));

      document.getElementById("breakfastInput").value = "";
      document.getElementById("lunchInput").value = "";
      document.getElementById("dinnerInput").value = "";

      renderMeals();
    }

    function winTaskId(task) {
      return normalise(task);
    }

    function loadStorage() {
      try {
        customMeals = JSON.parse(localStorage.getItem(storageKey("customMeals")) || "{}");
      } catch {
        customMeals = {};
      }

      customMeals = {
        breakfast: customMeals.breakfast || "",
        lunch: customMeals.lunch || "",
        dinner: customMeals.dinner || ""
      };

      try {
        winTasks = JSON.parse(localStorage.getItem(storageKey("winTasks")) || "null") || DEFAULT_WIN_TASKS;
        checkedWin = JSON.parse(localStorage.getItem(storageKey("checkedWin")) || "{}");
      } catch {
        winTasks = DEFAULT_WIN_TASKS;
        checkedWin = {};
      }

      winTasks.forEach(task => {
        const id = winTaskId(task);
        if (checkedWin[id] === undefined) checkedWin[id] = false;
      });

      saveWinStorage();
    }

    function saveWinStorage() {
      localStorage.setItem(storageKey("winTasks"), JSON.stringify(winTasks));
      localStorage.setItem(storageKey("checkedWin"), JSON.stringify(checkedWin));
    }

    function toggleWinTask(task) {
      const id = winTaskId(task);
      checkedWin[id] = !checkedWin[id];
      saveWinStorage();
      renderWin();
    }

    function renderWin() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      if (!winTasks.length) {
        list.innerHTML = `<div class="note">No tasks yet. Click edit to add your wins.</div>`;
        renderWinEditList();
        return;
      }

      winTasks.forEach(task => {
        const id = winTaskId(task);
        const row = document.createElement("div");
        row.className = checkedWin[id] ? "task-row done" : "task-row";

        const button = document.createElement("button");
        button.className = checkedWin[id] ? "check checked" : "check";
        button.onclick = () => toggleWinTask(task);

        const label = document.createElement("span");
        label.className = "task-label";
        label.textContent = task;

        row.appendChild(button);
        row.appendChild(label);
        list.appendChild(row);
      });

      renderWinEditList();
    }

    function renderWinEditList() {
      const editList = document.getElementById("editList");
      editList.innerHTML = "";

      if (!winTasks.length) {
        editList.innerHTML = `<div class="note">Your tasks will appear here.</div>`;
        return;
      }

      winTasks.forEach((task, index) => {
        const row = document.createElement("div");
        row.className = "edit-item";

        const label = document.createElement("span");
        label.textContent = task;

        const remove = document.createElement("button");
        remove.className = "remove-btn";
        remove.textContent = "×";
        remove.onclick = () => removeWinTask(index);

        row.appendChild(label);
        row.appendChild(remove);
        editList.appendChild(row);
      });
    }

    function addWinTask() {
      const input = document.getElementById("newTaskInput");
      const value = input.value.trim();

      if (!value) return;

      winTasks.push(value);
      checkedWin[winTaskId(value)] = false;
      input.value = "";

      saveWinStorage();
      renderWin();
    }

    function removeWinTask(index) {
      const removed = winTasks[index];
      delete checkedWin[winTaskId(removed)];

      winTasks.splice(index, 1);

      saveWinStorage();
      renderWin();
    }

    function resetWinDefaultTasks() {
      winTasks = [...DEFAULT_WIN_TASKS];
      checkedWin = {};

      winTasks.forEach(task => {
        checkedWin[winTaskId(task)] = false;
      });

      saveWinStorage();
      renderWin();
    }

    function openWinEdit() {
      document.getElementById("winOverlay").classList.add("open");
      renderWinEditList();
    }

    function closeWinEdit() {
      document.getElementById("winOverlay").classList.remove("open");
    }

    async function loadMealsFromAPI() {
      loadStorage();
      renderMeals();
      renderWin();

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error("Could not load dashboard data.");
        }

        const data = await response.json();

        apiMeals = {
          breakfast: data.breakfast || "",
          lunch: data.lunch || "",
          dinner: data.dinner || ""
        };

        renderMeals();
      } catch (error) {
        console.error(error);
      }
    }

    document.getElementById("newTaskInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") addWinTask();
    });

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeMealsEdit();
        closeWinEdit();
      }

      const mealsOpen = document.getElementById("mealsOverlay").classList.contains("open");
      if (mealsOpen && event.key === "Enter") {
        saveMealsCustom();
      }
    });

    loadMealsFromAPI();
  </script>
</body>
</html>
