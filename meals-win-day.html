<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: transparent;
      --card: #fffdfb;
      --border: #eadfd6;
      --text: #4f4038;
      --muted: #9b8b80;
      --row: #fffaf7;
      --shadow: rgba(79, 64, 56, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .widget {
      width: 100%;
      padding: 12px;
    }

    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 18px;
    }

    .meals {
      display: grid;
      gap: 9px;
    }

    .meal {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--row);
    }

    .meal-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .meal-name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
    }

    @media (min-width: 560px) {
      .card {
        padding: 24px;
      }

      .title {
        font-size: 34px;
      }

      .meal {
        grid-template-columns: 100px 1fr;
        padding: 13px 16px;
      }

      .meal-name {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="card">
      <div class="title">Meal Plan</div>

      <div class="meals">
        <div class="meal">
          <div class="meal-label">Breakfast</div>
          <div class="meal-name">Greek yoghurt bowl with berries, honey & granola</div>
        </div>

        <div class="meal">
          <div class="meal-label">Lunch</div>
          <div class="meal-name">Chicken rice bowl with cucumber, herbs & lemon yoghurt</div>
        </div>

        <div class="meal">
          <div class="meal-label">Dinner</div>
          <div class="meal-name">Warm salmon, potatoes & roasted vegetables</div>
        </div>

        <div class="meal">
          <div class="meal-label">Snack</div>
          <div class="meal-name">Dark chocolate, fruit or a protein drink</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
