<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card: #fffdfb;
      --border: #e9e1d8;
      --text: #5f5449;
      --muted: #a79a8a;
      --sage: #aab39a;
      --sage-dark: #8d977c;
      --blush: #f3e6df;
      --cream: #fffaf6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 100%;
      min-height: 225px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sparkle {
      width: 24px;
      height: 24px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
    }

    .progress-circle {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 2px solid var(--sage-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f3ee;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      line-height: 1.25;
      color: var(--text);
    }

    .check {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1.6px solid #cdbfaf;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }

    .check.checked {
      background: var(--sage);
      border-color: var(--sage);
    }

    .check.checked::after {
      content: "✓";
      color: white;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .label {
      flex: 1;
    }

    .label.custom::after {
      content: " custom";
      margin-left: 6px;
      font-size: 10px;
      color: var(--muted);
      font-style: italic;
    }

    .edit-btn {
      position: absolute;
      right: 14px;
      bottom: 13px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: #7a5c51;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .edit-btn:hover {
      background: #f5eee8;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 253, 251, 0.96);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 18px;
      z-index: 10;
    }

    .overlay.open {
      display: block;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      padding: 8px 10px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    input:focus {
      border-color: #d2c3b7;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: var(--blush);
      color: #6c5148;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .custom-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 92px;
      overflow: auto;
      padding-right: 3px;
      margin-bottom: 12px;
    }

    .custom-edit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      border: 1px solid #eee4dd;
      background: #fffaf6;
      border-radius: 10px;
      padding: 7px 9px;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #b48a84;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .loading,
    .error {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="title-wrap">
        <svg class="sparkle" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2.5L14.1 8L20 10L14.1 12L12 17.5L9.9 12L4 10L9.9 8L12 2.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
        <div class="title">Beauty Today</div>
      </div>

      <div class="progress-circle" id="progressCircle">0/0</div>
    </div>

    <div id="content">
      <div class="loading">Loading beauty routine…</div>
    </div>

    <button class="edit-btn" onclick="openEdit()">Edit</button>

    <div id="overlay" class="overlay">
      <div class="overlay-title">Add beauty to-dos</div>

      <div class="input-row">
        <input id="newTaskInput" placeholder="e.g. Lip mask, gua sha, perfume">
        <button class="small-btn" onclick="addCustomTask()">Add</button>
      </div>

      <div id="customList" class="custom-list"></div>

      <div class="actions">
        <button class="small-btn" onclick="closeEdit()">Done</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://notion-daily-dashboard-api.vercel.app/api/dashboard";

    let notionTasks = [];
    let customTasks = [];
    let checked = {};

    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function storageKey(name) {
      return `beauty-widget-${todayKey()}-${name}`;
    }

    function normalise(text) {
      return (text || "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^\w\s]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function tidyLabel(text) {
      return (text || "")
        .replace(/beauty today/gi, "")
        .replace(/nothing right now/gi, "")
        .replace(/[•✦✨]/g, "")
        .trim();
    }

    function parseTasks(raw) {
      const cleaned = tidyLabel(raw);

      if (!cleaned) return [];

      return cleaned
        .split(/,|\n|•|·|\/|;/)
        .map(task => tidyLabel(task))
        .filter(Boolean);
    }

    function loadStorage() {
      try {
        customTasks = JSON.parse(localStorage.getItem(storageKey("custom")) || "[]");
        checked = JSON.parse(localStorage.getItem(storageKey("checked")) || "{}");
      } catch {
        customTasks = [];
        checked = {};
      }
    }

    function saveStorage() {
      localStorage.setItem(storageKey("custom"), JSON.stringify(customTasks));
      localStorage.setItem(storageKey("checked"), JSON.stringify(checked));
    }

    function taskId(label, source) {
      return `${source}:${normalise(label)}`;
    }

    function allTasks() {
      const fromNotion = notionTasks.map(label => ({
        label,
        source: "notion"
      }));

      const fromCustom = customTasks.map(label => ({
        label,
        source: "custom"
      }));

      return [...fromNotion, ...fromCustom];
    }

    function toggleTask(label, source) {
      const id = taskId(label, source);
      checked[id] = !checked[id];
      saveStorage();
      render();
    }

    function render() {
      const tasks = allTasks();
      const total = tasks.length;
      const done = tasks.filter(task => checked[taskId(task.label, task.source)]).length;

      document.getElementById("progressCircle").textContent = `${done}/${total}`;

      const content = document.getElementById("content");
      content.innerHTML = "";

      if (!tasks.length) {
        content.innerHTML = `<div class="note">No beauty tasks found yet. Click edit to add your own.</div>`;
        renderCustomEditList();
        return;
      }

      const list = document.createElement("div");
      list.className = "list";

      tasks.forEach(task => {
        const id = taskId(task.label, task.source);
        const row = document.createElement("div");
        row.className = "item";

        const button = document.createElement("button");
        button.className = checked[id] ? "check checked" : "check";
        button.onclick = () => toggleTask(task.label, task.source);
        button.setAttribute("aria-label", `Toggle ${task.label}`);

        const label = document.createElement("span");
        label.className = task.source === "custom" ? "label custom" : "label";
        label.textContent = task.label;

        row.appendChild(button);
        row.appendChild(label);
        list.appendChild(row);
      });

      content.appendChild(list);
      renderCustomEditList();
    }

    function renderCustomEditList() {
      const customList = document.getElementById("customList");
      customList.innerHTML = "";

      if (!customTasks.length) {
        customList.innerHTML = `<div class="note">Your custom tasks will appear here.</div>`;
        return;
      }

      customTasks.forEach((task, index) => {
        const row = document.createElement("div");
        row.className = "custom-edit-item";

        const label = document.createElement("span");
        label.textContent = task;

        const remove = document.createElement("button");
        remove.className = "remove-btn";
        remove.textContent = "×";
        remove.onclick = () => removeCustomTask(index);

        row.appendChild(label);
        row.appendChild(remove);
        customList.appendChild(row);
      });
    }

    function addCustomTask() {
      const input = document.getElementById("newTaskInput");
      const value = input.value.trim();

      if (!value) return;

      customTasks.push(value);
      input.value = "";
      saveStorage();
      render();
    }

    function removeCustomTask(index) {
      const removed = customTasks[index];
      const id = taskId(removed, "custom");

      customTasks.splice(index, 1);
      delete checked[id];

      saveStorage();
      render();
    }

    function openEdit() {
      document.getElementById("overlay").classList.add("open");
      renderCustomEditList();
    }

    function closeEdit() {
      document.getElementById("overlay").classList.remove("open");
    }

    async function loadBeautyWidget() {
      loadStorage();

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error("Could not load dashboard data.");
        }

        const data = await response.json();

        notionTasks = parseTasks(data.beautyToday || "");

        notionTasks.forEach(task => {
          const id = taskId(task, "notion");

          if (checked[id] === undefined) {
            checked[id] = false;
          }
        });

        saveStorage();
        render();
      } catch (error) {
        document.getElementById("content").innerHTML = `<div class="error">Could not load Beauty Today.</div>`;
        console.error(error);
      }
    }

    document.getElementById("newTaskInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        addCustomTask();
      }
    });

    loadBeautyWidget();
  </script>
</body>
</html>
