<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card: #fffdfb;
      --border: #ece2d9;
      --text: #5e5146;
      --muted: #a59688;
      --soft-brown: #8f7c6f;
      --cream: #fffaf6;
      --blush: #f6ebe6;
      --shadow: rgba(99, 82, 70, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 320px;
      min-height: 225px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
      position: relative;
      z-index: 3;
    }

    .icon {
      width: 20px;
      height: 20px;
      color: #b5a493;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .main {
      position: relative;
      z-index: 3;
      width: 52%;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .workout-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 500;
      color: #4d4038;
      margin-top: 4px;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
      max-width: 150px;
    }

    .duration {
      font-size: 13px;
      line-height: 1.2;
      font-weight: 600;
      color: #927f72;
    }

    .empty-title {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 500;
      color: #4d4038;
      margin-top: 6px;
      margin-bottom: 12px;
      max-width: 160px;
    }

    .empty-sub {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      max-width: 165px;
    }

    .photo-area {
      position: absolute;
      right: 8px;
      bottom: 10px;
      width: 142px;
      height: 155px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
    }

    .photo-glow {
      position: absolute;
      right: -18px;
      bottom: -12px;
      width: 148px;
      height: 105px;
      background: rgba(244, 233, 227, 0.78);
      border-radius: 100px 100px 0 0;
      z-index: 0;
    }

    .photo {
      position: relative;
      z-index: 2;
      width: 126px;
      max-height: 138px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(92, 73, 60, 0.10));
      border-radius: 10px;
    }

    .edit-btn {
      position: absolute;
      right: 14px;
      bottom: 12px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: #7b5d52;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 11px;
      cursor: pointer;
      font-weight: 700;
      z-index: 5;
    }

    .edit-btn:hover {
      background: #f7efe9;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 253, 251, 0.97);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 18px;
      z-index: 10;
    }

    .overlay.open {
      display: block;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text);
    }

    .input-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: white;
      padding: 10px 11px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: #d7c7bb;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: var(--blush);
      color: #6e5348;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .small-btn.secondary {
      background: var(--cream);
    }

    .loading,
    .error {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 9V15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M19 9V15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M8 7V17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M16 7V17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M8 12H16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M3.5 10.5V13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M20.5 10.5V13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <div class="title">Workout</div>
    </div>

    <div id="content" class="main">
      <div class="loading">Loading workout…</div>
    </div>

    <div class="photo-area" aria-hidden="true">
      <div class="photo-glow"></div>
      <img
        id="workoutPhoto"
        class="photo"
        src="https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=700&q=80"
        alt=""
      />
    </div>

    <button class="edit-btn" onclick="openEdit()">Edit</button>

    <div id="overlay" class="overlay">
      <div class="overlay-title">Edit workout</div>

      <div class="input-stack">
        <input id="workoutInput" placeholder="e.g. Lower Body Workout">
        <input id="durationInput" placeholder="e.g. 45 min">
        <input id="photoInput" placeholder="Paste image URL here">
      </div>

      <div class="actions">
        <button class="small-btn secondary" onclick="clearCustom()">Clear</button>
        <button class="small-btn" onclick="saveCustom()">Save</button>
        <button class="small-btn secondary" onclick="closeEdit()">Done</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://notion-daily-dashboard-api.vercel.app/api/dashboard";
    const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=700&q=80";

    let apiWorkout = "";
    let customWorkout = "";
    let customDuration = "";
    let customPhoto = "";

    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function storageKey(name) {
      return `workout-widget-${todayKey()}-${name}`;
    }

    function loadStorage() {
      customWorkout = localStorage.getItem(storageKey("customWorkout")) || "";
      customDuration = localStorage.getItem(storageKey("customDuration")) || "";
      customPhoto = localStorage.getItem(storageKey("customPhoto")) || "";
    }

    function saveStorage() {
      localStorage.setItem(storageKey("customWorkout"), customWorkout);
      localStorage.setItem(storageKey("customDuration"), customDuration);
      localStorage.setItem(storageKey("customPhoto"), customPhoto);
    }

    function cleanWorkoutText(text) {
      return (text || "")
        .replace(/nothing planned for today/gi, "")
        .replace(/workout/gi, "")
        .replace(/[•✨✦]/g, "")
        .trim();
    }

    function getDisplayWorkout() {
      return customWorkout || cleanWorkoutText(apiWorkout);
    }

    function getDisplayDuration() {
      return customDuration || "45 min";
    }

    function getDisplayPhoto() {
      return customPhoto || DEFAULT_IMAGE;
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      const content = document.getElementById("content");
      const workout = getDisplayWorkout();
      document.getElementById("workoutPhoto").src = getDisplayPhoto();

      if (!workout) {
        content.innerHTML = `
          <div class="empty-title">No workout planned</div>
          <div class="empty-sub">Add one manually or link one in your Notion Daily Dashboard.</div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="workout-name">${escapeHTML(workout)}</div>
        <div class="duration">${escapeHTML(getDisplayDuration())}</div>
      `;
    }

    function openEdit() {
      document.getElementById("overlay").classList.add("open");
      document.getElementById("workoutInput").value = getDisplayWorkout();
      document.getElementById("durationInput").value = customDuration || "45 min";
      document.getElementById("photoInput").value = customPhoto || "";
    }

    function closeEdit() {
      document.getElementById("overlay").classList.remove("open");
    }

    function saveCustom() {
      customWorkout = document.getElementById("workoutInput").value.trim();
      customDuration = document.getElementById("durationInput").value.trim();
      customPhoto = document.getElementById("photoInput").value.trim();
      saveStorage();
      render();
    }

    function clearCustom() {
      customWorkout = "";
      customDuration = "";
      customPhoto = "";

      localStorage.removeItem(storageKey("customWorkout"));
      localStorage.removeItem(storageKey("customDuration"));
      localStorage.removeItem(storageKey("customPhoto"));

      document.getElementById("workoutInput").value = "";
      document.getElementById("durationInput").value = "";
      document.getElementById("photoInput").value = "";
      render();
    }

    async function loadWorkoutWidget() {
      loadStorage();

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Could not load dashboard data.");

        const data = await response.json();
        apiWorkout = data.workout || "";
        render();
      } catch (error) {
        document.getElementById("content").innerHTML = `<div class="error">Could not load workout.</div>`;
        console.error(error);
      }
    }

    document.addEventListener("keydown", function(event) {
      const overlayOpen = document.getElementById("overlay").classList.contains("open");
      if (!overlayOpen) return;
      if (event.key === "Escape") closeEdit();
    });

    document.getElementById("workoutInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") saveCustom();
    });

    document.getElementById("durationInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") saveCustom();
    });

    document.getElementById("photoInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") saveCustom();
    });

    loadWorkoutWidget();
  </script>
</body>
</html>
