<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card: #fffdfb;
      --border: #ece2d9;
      --text: #5e5146;
      --muted: #a59688;
      --cream: #fffaf6;
      --blush: #f6ebe6;
      --rose: #d9aaa1;
      --rose-soft: #ead2cb;
      --brown-soft: #b3a294;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 100%;
      min-height: 225px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
      position: relative;
      z-index: 3;
    }

    .icon {
      width: 20px;
      height: 20px;
      color: #b5a493;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .main {
      position: relative;
      z-index: 3;
      width: 52%;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .workout-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 500;
      color: #4d4038;
      margin-top: 4px;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
      max-width: 150px;
    }

    .duration {
      font-size: 13px;
      line-height: 1.2;
      font-weight: 600;
      color: #927f72;
    }

    .empty-title {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 500;
      color: #4d4038;
      margin-top: 6px;
      margin-bottom: 12px;
      max-width: 160px;
    }

    .empty-sub {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      max-width: 165px;
    }

    .picture-area {
      position: absolute;
      right: 2px;
      bottom: 6px;
      width: 165px;
      height: 155px;
      z-index: 1;
      pointer-events: none;
    }

    .soft-arch {
      position: absolute;
      right: -26px;
      bottom: -16px;
      width: 165px;
      height: 120px;
      border-radius: 100px 100px 0 0;
      background: rgba(244, 234, 229, 0.82);
      z-index: 0;
    }

    .product-scene {
      position: absolute;
      right: 14px;
      bottom: 10px;
      width: 132px;
      height: 125px;
      z-index: 2;
      filter: drop-shadow(0 10px 12px rgba(92, 73, 60, 0.10));
    }

    .edit-btn {
      position: absolute;
      right: 14px;
      bottom: 12px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: #7b5d52;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 11px;
      cursor: pointer;
      font-weight: 700;
      z-index: 5;
    }

    .edit-btn:hover {
      background: #f7efe9;
    }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 253, 251, 0.97);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 18px;
      z-index: 10;
    }

    .overlay.open {
      display: block;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text);
    }

    .input-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: white;
      padding: 10px 11px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: #d7c7bb;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: var(--blush);
      color: #6e5348;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .small-btn.secondary {
      background: var(--cream);
    }

    .loading,
    .error {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 9V15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M19 9V15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M8 7V17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M16 7V17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M8 12H16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M3.5 10.5V13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M20.5 10.5V13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <div class="title">Workout</div>
    </div>

    <div id="content" class="main">
      <div class="loading">Loading workout…</div>
    </div>

    <div class="picture-area" aria-hidden="true">
      <div class="soft-arch"></div>

      <svg class="product-scene" viewBox="0 0 180 165" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="91" cy="145" rx="62" ry="8" fill="#EADDD6" opacity="0.55"/>

        <g transform="translate(18 84) rotate(-14)">
          <rect x="0" y="22" width="92" height="42" rx="21" fill="#DDB8B0"/>
          <rect x="2" y="24" width="38" height="38" rx="19" fill="#D2A49C"/>
          <circle cx="21" cy="43" r="12" fill="#FFF7F3"/>
          <circle cx="21" cy="43" r="5" fill="#C9978E"/>
          <path d="M40 26C52 27 66 25 84 25" stroke="#E7CAC2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </g>

        <g transform="translate(106 18)">
          <rect x="17" y="0" width="25" height="17" rx="6" fill="#8E7B70"/>
          <rect x="9" y="13" width="42" height="98" rx="20" fill="#D8AFA6"/>
          <rect x="16" y="29" width="28" height="57" rx="14" fill="#E6C7BF" opacity="0.72"/>
          <path d="M30 16V107" stroke="#CFA199" stroke-width="2" opacity="0.25"/>
          <ellipse cx="30" cy="13" rx="17" ry="4" fill="#E8CDC6" opacity="0.65"/>
        </g>

        <g transform="translate(98 120) rotate(-7)">
          <circle cx="8" cy="18" r="11" fill="#E8D8D1"/>
          <circle cx="39" cy="15" r="13" fill="#E8D8D1"/>
          <rect x="15" y="14" width="24" height="7" rx="3.5" fill="#CDB3A9"/>
        </g>

        <circle cx="67" cy="135" r="10" fill="#E9D7D0"/>
        <circle cx="86" cy="130" r="8" fill="#E9D7D0"/>
        <circle cx="101" cy="139" r="7" fill="#E9D7D0"/>

        <path d="M21 81C38 63 55 56 72 60" stroke="#F3E8E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
      </svg>
    </div>

    <button class="edit-btn" onclick="openEdit()">Edit</button>

    <div id="overlay" class="overlay">
      <div class="overlay-title">Edit workout</div>

      <div class="input-stack">
        <input id="workoutInput" placeholder="e.g. Lower Body Workout">
        <input id="durationInput" placeholder="e.g. 45 min">
      </div>

      <div class="actions">
        <button class="small-btn secondary" onclick="clearCustom()">Clear</button>
        <button class="small-btn" onclick="saveCustom()">Save</button>
        <button class="small-btn secondary" onclick="closeEdit()">Done</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://notion-daily-dashboard-api.vercel.app/api/dashboard";

    let apiWorkout = "";
    let customWorkout = "";
    let customDuration = "";

    function todayKey() {
      return new Date().toISOString().split("T")[0];
    }

    function storageKey(name) {
      return `workout-widget-${todayKey()}-${name}`;
    }

    function loadStorage() {
      customWorkout = localStorage.getItem(storageKey("customWorkout")) || "";
      customDuration = localStorage.getItem(storageKey("customDuration")) || "";
    }

    function saveStorage() {
      localStorage.setItem(storageKey("customWorkout"), customWorkout);
      localStorage.setItem(storageKey("customDuration"), customDuration);
    }

    function cleanWorkoutText(text) {
      return (text || "")
        .replace(/nothing planned for today/gi, "")
        .replace(/^workout/gi, "")
        .replace(/[•✨✦]/g, "")
        .trim();
    }

    function getDisplayWorkout() {
      return customWorkout || cleanWorkoutText(apiWorkout);
    }

    function getDisplayDuration() {
      return customDuration || "45 min";
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      const content = document.getElementById("content");
      const workout = getDisplayWorkout();

      if (!workout) {
        content.innerHTML = `
          <div class="empty-title">No workout planned</div>
          <div class="empty-sub">Add one manually or link one in your Notion Daily Dashboard.</div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="workout-name">${escapeHTML(workout)}</div>
        <div class="duration">${escapeHTML(getDisplayDuration())}</div>
      `;
    }

    function openEdit() {
      document.getElementById("overlay").classList.add("open");
      document.getElementById("workoutInput").value = getDisplayWorkout();
      document.getElementById("durationInput").value = customDuration || "45 min";
    }

    function closeEdit() {
      document.getElementById("overlay").classList.remove("open");
    }

    function saveCustom() {
      customWorkout = document.getElementById("workoutInput").value.trim();
      customDuration = document.getElementById("durationInput").value.trim();
      saveStorage();
      render();
    }

    function clearCustom() {
      customWorkout = "";
      customDuration = "";

      localStorage.removeItem(storageKey("customWorkout"));
      localStorage.removeItem(storageKey("customDuration"));

      document.getElementById("workoutInput").value = "";
      document.getElementById("durationInput").value = "";
      render();
    }

    async function loadWorkoutWidget() {
      loadStorage();

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Could not load dashboard data.");

        const data = await response.json();
        apiWorkout = data.workout || "";
        render();
      } catch (error) {
        document.getElementById("content").innerHTML = `<div class="error">Could not load workout.</div>`;
        console.error(error);
      }
    }

    document.addEventListener("keydown", function(event) {
      const overlayOpen = document.getElementById("overlay").classList.contains("open");
      if (!overlayOpen) return;
      if (event.key === "Escape") closeEdit();
    });

    document.getElementById("workoutInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") saveCustom();
    });

    document.getElementById("durationInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") saveCustom();
    });

    loadWorkoutWidget();
  </script>
</body>
</html>
